name: wlingo
description: "A new Flutter project."
publish_to: "none"
version: 0.1.5

environment:
  sdk: ^3.9.0

dependencies:
  dots_indicator: ^4.0.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_launcher_icons: ^0.14.4
  flutter_localization: ^0.3.3
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_pdfview: ^1.4.3
  get_it: ^9.1.0
  http: ^1.6.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  speech_to_text: ^7.3.0
  supabase_flutter: ^2.10.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_native_splash:
  color: "#410FA3"
  image: assets/images/splash.png
  ios_content_mode: scaleAsceptFit
  android_12:
    color: "#410FA3"
    image: assets/images/splash.png

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/images/icons/

  fonts:
    - family: Fredoka
      fonts:
        - asset: "assets/fonts/Fredoka-light.ttf"
          weight: 300
        - asset: "assets/fonts/Fredoka-Regular.ttf"
          weight: 400
        - asset: "assets/fonts/Fredoka-Medium.ttf"
          weight: 500
        - asset: "assets/fonts/Fredoka-SemiBold.ttf"
          weight: 600
        - asset: "assets/fonts/Fredoka-Bold.ttf"
          weight: 700
